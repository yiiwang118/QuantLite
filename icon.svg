<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="inner-glow">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- 圆角方块背景（iOS / 小程序通用 ~22% 圆角）-->
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#bg-grad)"/>

  <!-- 顶部高光（轻微，提升立体感）-->
  <rect width="1024" height="380" rx="224" ry="224" fill="white" opacity="0.08"/>

  <!-- TrendingUp icon — 来自 Ionicons，居中放大 -->
  <g transform="translate(154, 154) scale(1.4)"
     fill="none" stroke="#ffffff" stroke-width="44"
     stroke-linecap="round" stroke-linejoin="round">
    <polyline points="352 144 464 144 464 256"/>
    <path d="M48 368L192 224l96 96L448 160"/>
  </g>
</svg>
